{% extends "base.html" %}
{% block title %}Add Question{% endblock %}
{% block content %}
<div class="card shadow-sm">
  <div class="card-body">
    <h4>Add Question to "{{ exam.title }}"</h4>
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="mb-3">
        <label class="form-label">Question Type</label>
        <select name="question_type" id="questionType" class="form-select" onchange="toggleQuestionType()">
          <option value="mcq">Multiple Choice</option>
          <option value="true_false">True / False</option>
          <option value="fill_blank">Fill in the Blank</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Question Text</label>
        <textarea name="question_text" class="form-control" rows="2" required></textarea>
      </div>

      <div id="mcqFields">
        <div class="mb-2"><label class="form-label">Option A</label><input type="text" name="option_a" class="form-control"></div>
        <div class="mb-2"><label class="form-label">Option B</label><input type="text" name="option_b" class="form-control"></div>
        <div class="mb-2"><label class="form-label">Option C</label><input type="text" name="option_c" class="form-control"></div>
        <div class="mb-3"><label class="form-label">Option D</label><input type="text" name="option_d" class="form-control"></div>
        <div class="mb-3">
          <label class="form-label">Correct Option</label>
          <select name="correct_option" class="form-select">
            <option value="A">A</option><option value="B">B</option>
            <option value="C">C</option><option value="D">D</option>
          </select>
        </div>
      </div>

      <div id="tfFields" class="d-none mb-3">
        <label class="form-label">Correct Answer</label>
        <select name="correct_tf" class="form-select">
          <option value="True">True</option>
          <option value="False">False</option>
        </select>
      </div>

      <div id="fillFields" class="d-none mb-3">
        <label class="form-label">Correct Answer (exact text, matched case-insensitively)</label>
        <input type="text" name="correct_text" class="form-control">
      </div>

      <div class="mb-3">
        <label class="form-label">Marks</label>
        <input type="number" name="marks" class="form-control" value="1" min="1" required>
      </div>

      <button type="submit" class="btn btn-primary">Add Question</button>
      <a href="{{ url_for('admin.manage_questions', exam_id=exam.id) }}" class="btn btn-outline-secondary">Cancel</a>
    </form>
  </div>
</div>

<script>
function toggleQuestionType() {
  const type = document.getElementById('questionType').value;
  const mcq = document.getElementById('mcqFields');
  const tf = document.getElementById('tfFields');
  const fill = document.getElementById('fillFields');

  mcq.classList.toggle('d-none', type !== 'mcq');
  tf.classList.toggle('d-none', type !== 'true_false');
  fill.classList.toggle('d-none', type !== 'fill_blank');

  const mcqInputs = mcq.querySelectorAll('input, select');
  mcqInputs.forEach(el => { if (el.name.startsWith('option_')) el.required = (type === 'mcq'); });
}
toggleQuestionType();
</script>
{% endblock %}
