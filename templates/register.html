{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h4 class="mb-3">Student Registration</h4>
        <form method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label">Full name</label>
            <input type="text" name="name" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Mobile Number</label>
              <input type="tel" name="mobile_number" class="form-control" placeholder="10-digit number" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Year of Study</label>
              <select name="year_of_study" class="form-select" required>
                <option value="" disabled selected>Select year</option>
                <option value="1">1st Year</option>
                <option value="2">2nd Year</option>
                <option value="3">3rd Year</option>
                <option value="4">4th Year</option>
              </select>
            </div>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Department <span class="text-muted small">(optional)</span></label>
              <input type="text" name="department" class="form-control" placeholder="e.g. CSE, ECE">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Roll Number <span class="text-muted small">(optional)</span></label>
              <input type="text" name="roll_number" class="form-control">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input type="password" name="confirm_password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Register</button>
        </form>
        <p class="mt-3 mb-0 small">Already have an account? <a href="{{ url_for('auth.login') }}">Login here</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
